<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workspace Timer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #bd4548;
      --panel: rgba(255, 255, 255, 0.11);
      --panel-strong: rgba(0, 0, 0, 0.14);
      --line: rgba(0, 0, 0, 0.1);
      --text: #fff7f7;
      --text-soft: rgba(255, 247, 247, 0.72);
      --text-faint: rgba(255, 247, 247, 0.48);
      --white: #ffffff;
      --button-text: #bd4548;
      --shadow: 0 18px 40px rgba(97, 24, 24, 0.14);
      --radius-xl: 20px;
      --radius-lg: 16px;
      --radius-md: 12px;
      --font-ui: "Nunito", sans-serif;
      --font-display: "Baloo 2", cursive;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      color: var(--text);
      font-family: var(--font-ui);
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.06), transparent 26%),
        linear-gradient(180deg, #c74749 0%, var(--bg) 35%, var(--bg) 100%);
    }

    body {
      min-height: 100vh;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app-shell {
      min-height: 100vh;
      padding: 12px 14px 40px;
    }

    .topbar {
      position: relative;
      padding: 4px 4px 18px;
      border-bottom: 1px solid var(--line);
    }

    .workspace-trigger {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: transparent;
      color: var(--white);
      padding: 0;
      font-size: clamp(2rem, 7vw, 2.7rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.05;
    }

    .caret {
      font-size: 1rem;
      opacity: 0.85;
      transform: translateY(3px);
    }

    .dropdown {
      position: absolute;
      z-index: 20;
      top: calc(100% - 6px);
      left: 4px;
      min-width: 240px;
      max-width: min(92vw, 320px);
      border-radius: 16px;
      background: rgba(124, 33, 33, 0.92);
      box-shadow: 0 18px 44px rgba(71, 17, 17, 0.28);
      padding: 10px;
      display: none;
    }

    .dropdown.open {
      display: block;
    }

    .dropdown-section {
      display: grid;
      gap: 6px;
    }

    .dropdown-label {
      color: var(--text-faint);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 6px 0;
    }

    .dropdown-item {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-radius: 12px;
      background: transparent;
      color: var(--white);
      padding: 12px 12px;
      font-size: 0.98rem;
      font-weight: 700;
      text-align: left;
    }

    .dropdown-item.active,
    .dropdown-item:hover,
    .dropdown-action:hover,
    .dropdown-icon:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .dropdown-item-name {
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .dropdown-icon {
      width: 34px;
      height: 34px;
      flex-shrink: 0;
      border-radius: 10px;
      background: transparent;
      color: rgba(255, 247, 247, 0.86);
      font-size: 1rem;
    }

    .dropdown-action {
      width: 100%;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--white);
      padding: 12px;
      font-size: 0.94rem;
      font-weight: 800;
      text-align: left;
    }

    .dropdown-divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
      margin: 8px 0;
    }

    .main {
      width: min(100%, 720px);
      margin: 26px auto 0;
    }

    .timer-card {
      position: relative;
      background: var(--panel);
      border-radius: var(--radius-xl);
      padding: 14px 12px 22px;
      box-shadow: var(--shadow);
    }

    .project-bar {
      position: relative;
      margin-bottom: 22px;
    }

    .project-controls {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      align-items: stretch;
    }

    .project-tab,
    .project-menu-trigger {
      min-height: 64px;
      border-radius: var(--radius-md);
      background: transparent;
      color: var(--white);
      padding: 12px 8px;
      text-align: center;
      font-size: 1rem;
      font-weight: 700;
    }

    .project-tab.active,
    .project-menu-trigger,
    .project-tab:hover,
    .project-menu-trigger:hover,
    .primary-btn:hover,
    .menu-btn:hover,
    .add-task-tile:hover {
      background: rgba(0, 0, 0, 0.13);
    }

    .project-menu-trigger {
      font-size: 1.55rem;
      line-height: 1;
    }

    .project-dropdown {
      top: calc(100% + 10px);
      left: auto;
      right: 0;
    }

    .timer-config-row {
      display: flex;
      justify-content: center;
      margin-bottom: 10px;
    }

    .timer-config {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-soft);
      font-size: 0.9rem;
      font-weight: 800;
    }

    .timer-config input {
      width: 74px;
      border: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      color: var(--white);
      text-align: center;
      padding: 6px 10px;
      font-weight: 800;
    }

    .timer-readout {
      margin: 10px 0 18px;
      text-align: center;
      font-size: clamp(5rem, 25vw, 8.4rem);
      line-height: 0.9;
      font-weight: 800;
      letter-spacing: 0.03em;
      font-variant-numeric: tabular-nums;
    }

    .timer-actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .primary-btn,
    .ghost-btn {
      border-radius: 8px;
      padding: 19px 30px 15px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 1.12rem;
      font-weight: 800;
    }

    .primary-btn {
      min-width: min(100%, 262px);
      background: var(--white);
      color: var(--button-text);
      box-shadow: 0 7px 0 rgba(0, 0, 0, 0.1);
    }

    .ghost-btn {
      background: rgba(255, 255, 255, 0.08);
      color: var(--white);
    }

    .session-copy {
      margin: 22px 0 30px;
      text-align: center;
    }

    .session-count {
      display: block;
      margin-bottom: 2px;
      color: var(--text-faint);
      font-size: 2rem;
      line-height: 1;
      font-weight: 700;
    }

    .session-title {
      font-size: 1.95rem;
      line-height: 1.08;
      font-family: var(--font-display);
    }

    .tasks-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .tasks-title {
      margin: 0;
      font-size: 2rem;
      line-height: 1;
      font-family: var(--font-display);
    }

    .menu-btn {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.14);
      color: var(--white);
      display: grid;
      place-items: center;
    }

    .tasks-divider {
      height: 3px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.62);
      margin-bottom: 16px;
    }

    .project-caption {
      margin: 0 0 14px;
      color: var(--text-soft);
      font-size: 0.94rem;
      font-weight: 700;
    }

    .tasks-list {
      display: grid;
      gap: 12px;
      margin-bottom: 18px;
    }

    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px;
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.14);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .task-toggle {
      width: 26px;
      height: 26px;
      margin-top: 4px;
      border-radius: 999px;
      border: 2px solid rgba(255, 255, 255, 0.84);
      background: transparent;
      color: transparent;
      flex-shrink: 0;
    }

    .task-item.done .task-toggle {
      background: var(--white);
      color: var(--bg);
      border-color: var(--white);
    }

    .task-copy {
      flex: 1;
      min-width: 0;
    }

    .task-name {
      font-size: 1.02rem;
      font-weight: 700;
      word-break: break-word;
    }

    .task-meta {
      margin-top: 2px;
      color: var(--text-soft);
      font-size: 0.84rem;
    }

    .task-item.done .task-name {
      color: var(--text-soft);
      text-decoration: line-through;
    }

    .delete-btn {
      width: 34px;
      height: 34px;
      margin-top: 4px;
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.12);
      color: var(--white);
      font-size: 1rem;
      flex-shrink: 0;
    }

    .task-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }

    .icon-action-btn {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.12);
      color: var(--white);
      font-size: 1rem;
      flex-shrink: 0;
    }

    .add-task-tile {
      width: 100%;
      min-height: 82px;
      border: 3px dashed rgba(255, 218, 218, 0.34);
      border-radius: 18px;
      background: transparent;
      color: #f2c0c0;
      display: grid;
      place-items: center;
      font-size: 1.15rem;
      font-weight: 800;
      padding: 18px;
    }

    .task-form {
      display: none;
      margin-top: 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.12);
      padding: 14px;
    }

    .task-form.open {
      display: block;
    }

    .task-input-row,
    .task-form-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .task-input {
      width: 100%;
      border: 0;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.16);
      color: var(--white);
      padding: 14px 16px;
      font-size: 1rem;
    }

    .task-input::placeholder {
      color: rgba(255, 247, 247, 0.65);
    }

    .task-notes {
      min-height: 96px;
      resize: vertical;
    }

    .task-type-select {
      appearance: none;
      background-image:
        linear-gradient(45deg, transparent 50%, rgba(255, 255, 255, 0.85) 50%),
        linear-gradient(135deg, rgba(255, 255, 255, 0.85) 50%, transparent 50%);
      background-position:
        calc(100% - 20px) calc(50% - 2px),
        calc(100% - 14px) calc(50% - 2px);
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
      padding-right: 34px;
    }

    .task-type-custom {
      display: none;
    }

    .task-type-custom.open {
      display: flex;
    }

    .task-checkbox-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      color: var(--text);
      font-size: 0.95rem;
      font-weight: 700;
    }

    .task-checkbox {
      width: 18px;
      height: 18px;
      accent-color: var(--white);
    }

    .task-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .task-badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      color: var(--white);
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .task-notes-copy {
      margin-top: 8px;
      color: var(--text-soft);
      font-size: 0.9rem;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .task-input:focus-visible,
    .timer-config input:focus-visible {
      outline: 2px solid rgba(255, 255, 255, 0.48);
      outline-offset: 1px;
    }

    .task-form-btn {
      border-radius: 12px;
      padding: 13px 16px;
      font-size: 0.98rem;
      font-weight: 800;
    }

    .task-form-btn.primary {
      background: var(--white);
      color: var(--button-text);
    }

    .task-form-btn.ghost {
      background: rgba(255, 255, 255, 0.08);
      color: var(--white);
    }

    .status {
      min-height: 22px;
      margin-top: 12px;
      text-align: center;
      color: var(--text-soft);
      font-size: 0.9rem;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (min-width: 680px) {
      .app-shell {
        padding: 16px 24px 56px;
      }

      .timer-card {
        padding: 16px 18px 26px;
      }

      .task-input-row,
      .task-form-actions {
        flex-direction: row;
      }

      .task-form-btn {
        min-width: 140px;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <button class="workspace-trigger" id="workspaceTrigger" type="button" aria-expanded="false" aria-controls="workspaceDropdown">
        <span id="workspaceTitle">Workspace 2</span>
        <span class="caret">▾</span>
      </button>

      <div class="dropdown" id="workspaceDropdown">
        <div class="dropdown-section" id="workspaceList"></div>
        <div class="dropdown-divider"></div>
        <button class="dropdown-action" id="createWorkspaceBtn" type="button">+ Create Workspace</button>
      </div>
    </header>

    <main class="main">
      <section class="timer-card" aria-labelledby="timerTitle">
        <div class="project-bar">
          <div id="projectTabs" class="project-controls"></div>
          <div class="dropdown project-dropdown" id="projectDropdown">
            <div class="dropdown-section" id="projectList"></div>
            <div class="dropdown-divider"></div>
            <button class="dropdown-action" id="createProjectBtn" type="button">+ Create Project</button>
          </div>
        </div>

        <div class="timer-config-row">
          <label class="timer-config" for="timerTargetInput">
            Target
            <input id="timerTargetInput" type="text" inputmode="numeric" value="20:00" aria-label="Timer target">
          </label>
        </div>

        <h2 class="sr-only" id="timerTitle">Project Timer</h2>
        <div class="timer-readout" id="timerDisplay" aria-live="polite">00:00</div>

        <div class="timer-actions">
          <button class="primary-btn" id="startPauseBtn" type="button">Start</button>
          <button class="ghost-btn" id="resetBtn" type="button">Reset</button>
        </div>
      </section>

      <section class="session-copy" aria-live="polite">
        <span class="session-count" id="sessionCount">#1</span>
        <div class="session-title" id="sessionMessage">Time to focus!</div>
      </section>

      <section class="tasks-section" aria-labelledby="tasksHeading">
        <div class="tasks-head">
          <h2 class="tasks-title" id="tasksHeading">Tasks</h2>
          <button class="menu-btn" type="button" id="clearCompletedBtn" aria-label="Clear completed tasks">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
              <circle cx="10" cy="4.5" r="1.7"></circle>
              <circle cx="10" cy="10" r="1.7"></circle>
              <circle cx="10" cy="15.5" r="1.7"></circle>
            </svg>
          </button>
        </div>

        <div class="tasks-divider" aria-hidden="true"></div>
        <p class="project-caption" id="projectCaption">Showing tasks for Project 2</p>
        <div class="tasks-list" id="tasksList"></div>

        <button class="add-task-tile" id="showTaskFormBtn" type="button">⊕ Add Task</button>

        <form class="task-form" id="taskForm">
          <div class="task-input-row">
            <input class="task-input" id="taskInput" type="text" maxlength="100" placeholder="What are you working on?" aria-label="Task name">
          </div>
          <div class="task-input-row">
            <select class="task-input task-type-select" id="taskTypeInput" aria-label="Task type"></select>
          </div>
          <div class="task-input-row task-type-custom" id="taskTypeCustomRow">
            <input class="task-input" id="taskTypeCustomInput" type="text" maxlength="40" placeholder="Add a task type" aria-label="Add a task type">
          </div>
          <div class="task-input-row">
            <textarea class="task-input task-notes" id="taskNotesInput" maxlength="400" placeholder="Task notes" aria-label="Task notes"></textarea>
          </div>
          <div class="task-input-row">
            <label class="task-checkbox-row" for="taskAgentEligibleInput">
              <input class="task-checkbox" id="taskAgentEligibleInput" type="checkbox">
              <span>Can be handled by an AI agent</span>
            </label>
          </div>
          <div class="task-form-actions">
            <button class="task-form-btn primary" type="submit">Save Task</button>
            <button class="task-form-btn ghost" type="button" id="cancelTaskBtn">Cancel</button>
          </div>
        </form>

        <div class="status" id="statusText">Projects, workspaces, and timer progress are saved on this device.</div>
      </section>
    </main>
  </div>

  <script>
    const STORAGE_KEY = "workspace-two-state-v2";
    const DEFAULT_TARGET_SECONDS = 20 * 60;
    const DEFAULT_TASK_TYPES = ["development", "design", "product"];

    const state = {
      activeWorkspaceId: "workspace-2",
      elapsedSeconds: 0,
      targetSeconds: DEFAULT_TARGET_SECONDS,
      isRunning: false,
      completedSessions: 0,
      lastTickAt: null,
      isTaskFormOpen: false,
      editingTaskId: null,
      isWorkspaceMenuOpen: false,
      isProjectMenuOpen: false,
      customTaskTypes: [],
      workspaces: [
        {
          id: "workspace-1",
          name: "Workspace 1",
          activeProjectId: "workspace-1-project-1",
          visibleProjectIds: ["workspace-1-project-1", "workspace-1-project-2"],
          projects: [
            { id: "workspace-1-project-1", name: "Project 1", tasks: [] },
            { id: "workspace-1-project-2", name: "Project 2", tasks: [] }
          ]
        },
        {
          id: "workspace-2",
          name: "Workspace 2",
          activeProjectId: "workspace-2-project-2",
          visibleProjectIds: ["workspace-2-project-1", "workspace-2-project-2"],
          projects: [
            { id: "workspace-2-project-1", name: "Project 1", tasks: [] },
            { id: "workspace-2-project-2", name: "Project 2", tasks: [] },
            { id: "workspace-2-project-3", name: "Project 3", tasks: [] }
          ]
        }
      ]
    };

    let timerId = null;

    const workspaceTrigger = document.getElementById("workspaceTrigger");
    const workspaceTitle = document.getElementById("workspaceTitle");
    const workspaceDropdown = document.getElementById("workspaceDropdown");
    const workspaceList = document.getElementById("workspaceList");
    const createWorkspaceBtn = document.getElementById("createWorkspaceBtn");
    const projectTabs = document.getElementById("projectTabs");
    const projectDropdown = document.getElementById("projectDropdown");
    const projectList = document.getElementById("projectList");
    const createProjectBtn = document.getElementById("createProjectBtn");
    const timerTargetInput = document.getElementById("timerTargetInput");
    const timerDisplay = document.getElementById("timerDisplay");
    const startPauseBtn = document.getElementById("startPauseBtn");
    const resetBtn = document.getElementById("resetBtn");
    const sessionCount = document.getElementById("sessionCount");
    const sessionMessage = document.getElementById("sessionMessage");
    const projectCaption = document.getElementById("projectCaption");
    const tasksList = document.getElementById("tasksList");
    const showTaskFormBtn = document.getElementById("showTaskFormBtn");
    const taskForm = document.getElementById("taskForm");
    const taskInput = document.getElementById("taskInput");
    const taskTypeInput = document.getElementById("taskTypeInput");
    const taskTypeCustomRow = document.getElementById("taskTypeCustomRow");
    const taskTypeCustomInput = document.getElementById("taskTypeCustomInput");
    const taskNotesInput = document.getElementById("taskNotesInput");
    const taskAgentEligibleInput = document.getElementById("taskAgentEligibleInput");
    const cancelTaskBtn = document.getElementById("cancelTaskBtn");
    const clearCompletedBtn = document.getElementById("clearCompletedBtn");
    const statusText = document.getElementById("statusText");

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (!saved) return;

        if (Array.isArray(saved.workspaces) && saved.workspaces.length) {
          state.workspaces = saved.workspaces.map((workspace, workspaceIndex) => ({
            id: workspace.id || `workspace-${workspaceIndex + 1}`,
            name: typeof workspace.name === "string" && workspace.name.trim() ? workspace.name : `Workspace ${workspaceIndex + 1}`,
            activeProjectId: typeof workspace.activeProjectId === "string" ? workspace.activeProjectId : null,
            visibleProjectIds: Array.isArray(workspace.visibleProjectIds) ? workspace.visibleProjectIds : [],
            projects: Array.isArray(workspace.projects) && workspace.projects.length
              ? workspace.projects.map((project, projectIndex) => ({
                  id: project.id || `project-${workspaceIndex + 1}-${projectIndex + 1}`,
                  name: typeof project.name === "string" && project.name.trim() ? project.name : `Project ${projectIndex + 1}`,
                  tasks: Array.isArray(project.tasks)
                    ? project.tasks
                        .filter((task) => task && typeof task.text === "string")
                        .map((task, taskIndex) => ({
                          id: task.id || `task-${workspaceIndex}-${projectIndex}-${taskIndex}-${Date.now()}`,
                          text: task.text,
                          type: typeof task.type === "string" ? task.type : "",
                          notes: typeof task.notes === "string" ? task.notes : "",
                          agentEligible: Boolean(task.agentEligible),
                          done: Boolean(task.done)
                        }))
                    : []
                }))
              : [{ id: `project-${workspaceIndex + 1}-1`, name: "Project 1", tasks: [] }]
          }));
        }

        if (typeof saved.activeWorkspaceId === "string") {
          state.activeWorkspaceId = saved.activeWorkspaceId;
        }
        if (typeof saved.elapsedSeconds === "number" && saved.elapsedSeconds >= 0) {
          state.elapsedSeconds = saved.elapsedSeconds;
        }
        if (typeof saved.targetSeconds === "number" && saved.targetSeconds > 0) {
          state.targetSeconds = saved.targetSeconds;
        }
        if (typeof saved.isRunning === "boolean") {
          state.isRunning = saved.isRunning;
        }
        if (typeof saved.completedSessions === "number" && saved.completedSessions >= 0) {
          state.completedSessions = saved.completedSessions;
        }
        if (typeof saved.lastTickAt === "number") {
          state.lastTickAt = saved.lastTickAt;
        }
        if (Array.isArray(saved.customTaskTypes)) {
          state.customTaskTypes = saved.customTaskTypes
            .filter((type) => typeof type === "string" && type.trim())
            .map((type) => type.trim().toLowerCase());
        }

        normalizeWorkspaceState();

        if (state.isRunning && state.lastTickAt) {
          const elapsedSinceLastTick = Math.floor((Date.now() - state.lastTickAt) / 1000);
          if (elapsedSinceLastTick > 0) {
            state.elapsedSeconds = Math.min(state.targetSeconds, state.elapsedSeconds + elapsedSinceLastTick);
          }
          state.lastTickAt = Date.now();
        }

        if (state.elapsedSeconds >= state.targetSeconds && state.isRunning) {
          finishSession();
        }
      } catch (error) {
        console.error("Failed to load app state.", error);
      }
    }

    function normalizeWorkspaceState() {
      if (!state.workspaces.length) {
        state.workspaces = [{
          id: "workspace-1",
          name: "Workspace 1",
          activeProjectId: "workspace-1-project-1",
          visibleProjectIds: ["workspace-1-project-1"],
          projects: [{ id: "workspace-1-project-1", name: "Project 1", tasks: [] }]
        }];
      }

      if (!getActiveWorkspace()) {
        state.activeWorkspaceId = state.workspaces[0].id;
      }

      state.workspaces.forEach((workspace) => {
        if (!workspace.projects.length) {
          workspace.projects.push({ id: `${workspace.id}-project-1`, name: "Project 1", tasks: [] });
        }
        if (!workspace.projects.find((project) => project.id === workspace.activeProjectId)) {
          workspace.activeProjectId = workspace.projects[0].id;
        }
        ensureVisibleProjectIds(workspace);
      });
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function getActiveWorkspace() {
      return state.workspaces.find((workspace) => workspace.id === state.activeWorkspaceId) || null;
    }

    function getActiveProject() {
      const workspace = getActiveWorkspace();
      return workspace?.projects.find((project) => project.id === workspace.activeProjectId) || null;
    }

    function ensureVisibleProjectIds(workspace) {
      if (!workspace) return;

      const validIds = workspace.projects.map((project) => project.id);
      const requiredCount = Math.min(2, validIds.length);
      const visible = (Array.isArray(workspace.visibleProjectIds) ? workspace.visibleProjectIds : [])
        .filter((id) => validIds.includes(id))
        .slice(0, 2);

      for (const projectId of validIds) {
        if (visible.length >= requiredCount) break;
        if (!visible.includes(projectId)) {
          visible.push(projectId);
        }
      }

      if (workspace.activeProjectId && validIds.includes(workspace.activeProjectId) && !visible.includes(workspace.activeProjectId)) {
        if (requiredCount <= 1 || visible.length <= 1) {
          visible[0] = workspace.activeProjectId;
        } else {
          visible[1] = workspace.activeProjectId;
        }
      }

      workspace.visibleProjectIds = visible.slice(0, requiredCount);
    }

    function setActiveProject(workspace, projectId) {
      if (!workspace || !projectId) return;

      const previousActiveId = workspace.activeProjectId;
      workspace.activeProjectId = projectId;

      const visible = (Array.isArray(workspace.visibleProjectIds) ? workspace.visibleProjectIds : [])
        .filter((id) => workspace.projects.some((project) => project.id === id))
        .slice(0, 2);

      if (visible.includes(projectId)) {
        workspace.visibleProjectIds = visible;
        ensureVisibleProjectIds(workspace);
        return;
      }

      if (visible.length < Math.min(2, workspace.projects.length)) {
        visible.push(projectId);
        workspace.visibleProjectIds = visible;
        ensureVisibleProjectIds(workspace);
        return;
      }

      const replacementIndex = visible.findIndex((id) => id !== previousActiveId);
      visible[replacementIndex >= 0 ? replacementIndex : 0] = projectId;
      workspace.visibleProjectIds = visible;
      ensureVisibleProjectIds(workspace);
    }

    function formatTime(totalSeconds) {
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
    }

    function parseTimeInput(value) {
      const trimmed = value.trim();
      const match = trimmed.match(/^(\d{1,2}):([0-5]\d)$/);
      if (!match) return null;
      return (Number(match[1]) * 60) + Number(match[2]);
    }

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function closestFromEventTarget(event, selector) {
      const target = event.target;
      if (target instanceof Element) {
        return target.closest(selector);
      }
      return target && target.parentElement ? target.parentElement.closest(selector) : null;
    }

    function setStatus(message) {
      statusText.textContent = message;
    }

    function getTaskTypeOptions() {
      return Array.from(new Set([...DEFAULT_TASK_TYPES, ...state.customTaskTypes]));
    }

    function renderTaskTypeOptions(selectedType = "") {
      const normalizedSelected = selectedType.trim().toLowerCase();
      const options = getTaskTypeOptions();
      taskTypeInput.innerHTML = "";

      const placeholderOption = document.createElement("option");
      placeholderOption.value = "";
      placeholderOption.textContent = "Select task type";
      taskTypeInput.appendChild(placeholderOption);

      options.forEach((type) => {
        const option = document.createElement("option");
        option.value = type;
        option.textContent = type[0].toUpperCase() + type.slice(1);
        taskTypeInput.appendChild(option);
      });

      const customOption = document.createElement("option");
      customOption.value = "__custom__";
      customOption.textContent = "Add more...";
      taskTypeInput.appendChild(customOption);

      if (normalizedSelected && options.includes(normalizedSelected)) {
        taskTypeInput.value = normalizedSelected;
      } else if (normalizedSelected) {
        taskTypeInput.value = "__custom__";
        taskTypeCustomInput.value = selectedType;
      } else {
        taskTypeInput.value = "";
      }

      syncTaskTypeCustomVisibility();
    }

    function syncTaskTypeCustomVisibility() {
      const isCustom = taskTypeInput.value === "__custom__";
      taskTypeCustomRow.classList.toggle("open", isCustom);
      if (!isCustom) {
        taskTypeCustomInput.value = "";
      }
    }

    function resetTaskFormFields() {
      taskInput.value = "";
      taskNotesInput.value = "";
      taskAgentEligibleInput.checked = false;
      state.editingTaskId = null;
      renderTaskTypeOptions("");
    }

    function getEditingTask() {
      const project = getActiveProject();
      return project?.tasks.find((task) => task.id === state.editingTaskId) || null;
    }

    function syncMenuVisibility() {
      workspaceTrigger.setAttribute("aria-expanded", String(state.isWorkspaceMenuOpen));
      workspaceDropdown.classList.toggle("open", state.isWorkspaceMenuOpen);
      projectDropdown.classList.toggle("open", state.isProjectMenuOpen);

      const projectMenuTrigger = document.getElementById("projectMenuTrigger");
      if (projectMenuTrigger) {

        selectButton.className = "dropdown-item";
        selectButton.type = "button";
        selectButton.dataset.action = "select-workspace";
        selectButton.dataset.workspaceId = workspace.id;
        selectButton.innerHTML = `<span class="dropdown-item-name">${escapeHtml(workspace.name)}</span>`;
        if (workspace.id === state.activeWorkspaceId) {

        renameButton.className = "dropdown-icon";
        renameButton.type = "button";
        renameButton.dataset.action = "rename-workspace";
        renameButton.dataset.workspaceId = workspace.id;

    function renderProjects() {
      const workspace = getActiveWorkspace();
      projectTabs.innerHTML = "";

      workspace.projects.forEach((project) => {

        selectButton.type = "button";

        selectButton.dataset.projectId = project.id;

        const renameButton = document.createElement("button");
        renameButton.className = "dropdown-icon";
        renameButton.type = "button";
        renameButton.dataset.action = "rename-project";
        renameButton.dataset.projectId = project.id;
        renameButton.setAttribute("aria-label", `Rename ${project.name}`);
        renameButton.textContent = "✎";

        const deleteButton = document.createElement("button");
        deleteButton.className = "dropdown-icon";
        deleteButton.type = "button";
        deleteButton.dataset.action = "delete-project";
        deleteButton.dataset.projectId = project.id;
        deleteButton.setAttribute("aria-label", `Delete ${project.name}`);
        deleteButton.textContent = "✕";

        wrapper.append(selectButton, renameButton, deleteButton);
        projectList.appendChild(wrapper);
      });
    }

    function renderTimer() {
      timerDisplay.textContent = formatTime(state.elapsedSeconds);
      timerTargetInput.value = formatTime(state.targetSeconds);
      startPauseBtn.textContent = state.isRunning ? "Pause" : (state.elapsedSeconds === 0 ? "Start" : "Resume");
      sessionCount.textContent = `#${Math.max(1, state.completedSessions + 1)}`;

      if (state.isRunning) {
        sessionMessage.textContent = `Focusing to ${formatTime(state.targetSeconds)}`;
      } else if (state.elapsedSeconds >= state.targetSeconds) {
        sessionMessage.textContent = "Session complete!";
      } else if (state.elapsedSeconds > 0) {
        sessionMessage.textContent = "Keep going!";
      } else {
        sessionMessage.textContent = "Time to focus!";
      }

      document.title = `${formatTime(state.elapsedSeconds)} / ${formatTime(state.targetSeconds)} - ${getActiveWorkspace()?.name || "Workspace"}`;
    }

    function renderTasks() {
      const project = getActiveProject();
      tasksList.innerHTML = "";
      projectCaption.textContent = `Showing tasks for ${project ? project.name : "your project"}`;

      if (!project || !project.tasks.length) {
        return;
      }

      project.tasks.forEach((task, index) => {
        const item = document.createElement("div");
        item.className = `task-item${task.done ? " done" : ""}`;
        const badges = [];
        if (task.type) {
          badges.push(`<span class="task-badge">${escapeHtml(task.type)}</span>`);
        }
        if (task.agentEligible) {
          badges.push('<span class="task-badge">AI Agent OK</span>');
        }
        item.innerHTML = `
          <button class="task-toggle" type="button" data-action="toggle-task" data-task-id="${task.id}" aria-label="Toggle task">${task.done ? "✓" : ""}</button>
          <div class="task-copy">
            <div class="task-name">${escapeHtml(task.text)}</div>
            <div class="task-meta">Task ${index + 1}</div>
            ${badges.length ? `<div class="task-badges">${badges.join("")}</div>` : ""}
            ${task.notes ? `<div class="task-notes-copy">${escapeHtml(task.notes)}</div>` : ""}
          </div>
          <div class="task-actions">
            <button class="icon-action-btn" type="button" data-action="edit-task" data-task-id="${task.id}" aria-label="Edit task">✎</button>
            <button class="delete-btn" type="button" data-action="delete-task" data-task-id="${task.id}" aria-label="Delete task">✕</button>
          </div>
        `;
        tasksList.appendChild(item);
      });
    }

    function renderTaskComposer() {
      taskForm.classList.toggle("open", state.isTaskFormOpen);
      showTaskFormBtn.style.display = state.isTaskFormOpen ? "none" : "grid";
      const primaryTaskButton = taskForm.querySelector(".task-form-btn.primary");
      if (state.isTaskFormOpen) {
        const editingTask = getEditingTask();
        primaryTaskButton.textContent = editingTask ? "Save Changes" : "Save Task";
        if (editingTask) {
          taskInput.value = editingTask.text;
          taskNotesInput.value = editingTask.notes || "";
          taskAgentEligibleInput.checked = Boolean(editingTask.agentEligible);
          renderTaskTypeOptions(editingTask.type || "");
        }
        window.setTimeout(() => taskInput.focus(), 0);
      } else {
        primaryTaskButton.textContent = "Save Task";
        resetTaskFormFields();
      }
    }

    function persistAndRender() {
      normalizeWorkspaceState();
      renderWorkspaceDropdown();
      renderProjects();
      renderTimer();
      renderTasks();
      renderTaskComposer();
      syncMenuVisibility();
      saveState();
    }

    function tick() {
      if (!state.isRunning) return;

      state.elapsedSeconds += 1;
      state.lastTickAt = Date.now();

      if (state.elapsedSeconds >= state.targetSeconds) {
        state.elapsedSeconds = state.targetSeconds;
        finishSession();
        return;
      }

      persistAndRender();
    }

    function startTimer() {
      if (state.isRunning) return;
      if (state.elapsedSeconds >= state.targetSeconds) {
        state.elapsedSeconds = 0;
      }
      state.isRunning = true;
      state.lastTickAt = Date.now();
      timerId = window.setInterval(tick, 1000);
      setStatus(`Timer started toward ${formatTime(state.targetSeconds)}.`);
      persistAndRender();
    }

    function pauseTimer() {
      if (!state.isRunning) return;
      state.isRunning = false;
      state.lastTickAt = null;
      window.clearInterval(timerId);
      timerId = null;
      setStatus("Timer paused.");
      persistAndRender();
    }

    function resetTimer() {
      state.isRunning = false;
      state.elapsedSeconds = 0;
      state.lastTickAt = null;
      window.clearInterval(timerId);
      timerId = null;
      setStatus("Timer reset to 00:00.");
      persistAndRender();
    }

    function finishSession() {
      state.isRunning = false;
      state.lastTickAt = null;
      window.clearInterval(timerId);
      timerId = null;
      state.completedSessions += 1;
      setStatus("Session complete. Nice work.");
      playChime();
      persistAndRender();
    }

    function playChime() {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) return;

      const context = new AudioContextClass();
      const oscillator = context.createOscillator();
      const gainNode = context.createGain();

      oscillator.type = "triangle";
      oscillator.frequency.setValueAtTime(660, context.currentTime);
      oscillator.frequency.linearRampToValueAtTime(880, context.currentTime + 0.18);

      gainNode.gain.setValueAtTime(0.0001, context.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.08, context.currentTime + 0.02);
      gainNode.gain.exponentialRampToValueAtTime(0.0001, context.currentTime + 0.45);

      oscillator.connect(gainNode);
      gainNode.connect(context.destination);
      oscillator.start();
      oscillator.stop(context.currentTime + 0.48);
      oscillator.onended = () => context.close();
    }

    function createWorkspace() {
      const nextNumber = state.workspaces.length + 1;
      const newWorkspaceId = `workspace-${Date.now()}`;
      const firstProjectId = `${newWorkspaceId}-project-1`;

      state.workspaces.push({
        id: newWorkspaceId,
        name: `Workspace ${nextNumber}`,
        activeProjectId: firstProjectId,
        visibleProjectIds: [firstProjectId],
        projects: [{ id: firstProjectId, name: "Project 1", tasks: [] }]
      });

      state.activeWorkspaceId = newWorkspaceId;
      state.isWorkspaceMenuOpen = false;
      state.isProjectMenuOpen = false;
      setStatus(`Workspace ${nextNumber} created.`);
      persistAndRender();
    }

    function renameWorkspace(workspaceId) {
      const workspace = state.workspaces.find((entry) => entry.id === workspaceId);
      if (!workspace) return;

      const nextName = window.prompt("Rename workspace", workspace.name);
      if (nextName === null) return;

      const trimmed = nextName.trim();
      if (!trimmed) {
        setStatus("Workspace name cannot be empty.");
        return;
      }

      workspace.name = trimmed;
      setStatus("Workspace renamed.");
      persistAndRender();
    }

    function deleteWorkspace(workspaceId) {
      if (state.workspaces.length === 1) {
        setStatus("You need at least one workspace.");
        return;
      }

      const workspace = state.workspaces.find((entry) => entry.id === workspaceId);
      state.workspaces = state.workspaces.filter((entry) => entry.id !== workspaceId);

      if (state.activeWorkspaceId === workspaceId) {
        state.activeWorkspaceId = state.workspaces[0].id;
      }

      state.isWorkspaceMenuOpen = false;
      state.isProjectMenuOpen = false;
      setStatus(`${workspace?.name || "Workspace"} deleted.`);
      persistAndRender();
    }

    function createProject() {
      const workspace = getActiveWorkspace();
      if (!workspace) return;

      const nextNumber = workspace.projects.length + 1;
      const projectId = `${workspace.id}-project-${Date.now()}`;
      const newProject = { id: projectId, name: `Project ${nextNumber}`, tasks: [] };

      workspace.projects.push(newProject);
      setActiveProject(workspace, projectId);
      state.isProjectMenuOpen = false;
      setStatus(`${newProject.name} created.`);
      persistAndRender();
    }

    function renameProject(projectId) {
      const workspace = getActiveWorkspace();
      const project = workspace?.projects.find((entry) => entry.id === projectId);
      if (!project) return;

      const nextName = window.prompt("Rename project", project.name);
      if (nextName === null) return;

      const trimmed = nextName.trim();
      if (!trimmed) {
        setStatus("Project name cannot be empty.");
        return;
      }

      project.name = trimmed;
      setStatus("Project renamed.");
      persistAndRender();
    }

    function deleteProject(projectId) {
      const workspace = getActiveWorkspace();
      if (!workspace) return;

      if (workspace.projects.length === 1) {
        setStatus("You need at least one project.");
        return;
      }

      const project = workspace.projects.find((entry) => entry.id === projectId);
      workspace.projects = workspace.projects.filter((entry) => entry.id !== projectId);
      workspace.visibleProjectIds = workspace.visibleProjectIds.filter((id) => id !== projectId);

      if (workspace.activeProjectId === projectId) {
        setActiveProject(workspace, workspace.projects[0].id);
      }

      state.isProjectMenuOpen = false;
      setStatus(`${project?.name || "Project"} deleted.`);
      persistAndRender();
    }

    function openTaskForm() {
      state.isTaskFormOpen = true;
      state.editingTaskId = null;
      resetTaskFormFields();
      persistAndRender();
    }

    function closeTaskForm() {
      state.isTaskFormOpen = false;
      state.editingTaskId = null;
      persistAndRender();
    }

    function editTask(taskId) {
      state.editingTaskId = taskId;
      state.isTaskFormOpen = true;
      setStatus("Editing task.");
      persistAndRender();
    }

    workspaceTrigger.addEventListener("click", (event) => {
      event.stopPropagation();
      state.isWorkspaceMenuOpen = !state.isWorkspaceMenuOpen;
      state.isProjectMenuOpen = false;
      syncMenuVisibility();
    });

    workspaceDropdown.addEventListener("click", (event) => {
      event.stopPropagation();
      const button = closestFromEventTarget(event, "[data-action]");
      if (!button) return;

      if (button.dataset.action === "select-workspace") {
        state.activeWorkspaceId = button.dataset.workspaceId;
        state.isWorkspaceMenuOpen = false;
        state.isProjectMenuOpen = false;
        setStatus("Workspace selected.");
        persistAndRender();
      }

      if (button.dataset.action === "delete-workspace") {
        deleteWorkspace(button.dataset.workspaceId);
      }

      if (button.dataset.action === "rename-workspace") {
        renameWorkspace(button.dataset.workspaceId);
      }
    });

    createWorkspaceBtn.addEventListener("click", createWorkspace);

    projectTabs.addEventListener("click", (event) => {
      event.stopPropagation();
      const button = closestFromEventTarget(event, "[data-action]");
      if (!button) return;

      if (button.dataset.action === "toggle-project-menu") {
        state.isProjectMenuOpen = !state.isProjectMenuOpen;
        state.isWorkspaceMenuOpen = false;
        syncMenuVisibility();
        return;
      }

      if (button.dataset.action === "select-project") {
        const workspace = getActiveWorkspace();
        if (!workspace) return;
        setActiveProject(workspace, button.dataset.projectId);
        state.isProjectMenuOpen = false;
        setStatus("Project selected.");
        persistAndRender();
      }
    });

    projectDropdown.addEventListener("click", (event) => {
      event.stopPropagation();
      const button = closestFromEventTarget(event, "[data-action]");
      if (!button) return;

      if (button.dataset.action === "select-project") {
        const workspace = getActiveWorkspace();
        if (!workspace) return;
        setActiveProject(workspace, button.dataset.projectId);
        state.isProjectMenuOpen = false;
        setStatus("Project selected.");
        persistAndRender();
      }

      if (button.dataset.action === "delete-project") {
        deleteProject(button.dataset.projectId);
      }

      if (button.dataset.action === "rename-project") {
        renameProject(button.dataset.projectId);
      }
    });

    createProjectBtn.addEventListener("click", createProject);

    taskTypeInput.addEventListener("change", () => {
      syncTaskTypeCustomVisibility();
      if (taskTypeInput.value === "__custom__") {
        window.setTimeout(() => taskTypeCustomInput.focus(), 0);
      }
    });

    timerTargetInput.addEventListener("change", () => {
      const parsed = parseTimeInput(timerTargetInput.value);
      if (!parsed || parsed <= 0) {
        timerTargetInput.value = formatTime(state.targetSeconds);
        setStatus("Use mm:ss format, for example 20:00.");
        return;
      }

      state.targetSeconds = parsed;
      if (state.elapsedSeconds > state.targetSeconds) {
        state.elapsedSeconds = state.targetSeconds;
      }
      setStatus(`Timer target set to ${formatTime(state.targetSeconds)}.`);
      persistAndRender();
    });

    startPauseBtn.addEventListener("click", () => {
      if (state.isRunning) {
        pauseTimer();
      } else {
        startTimer();
      }
    });

    resetBtn.addEventListener("click", resetTimer);
    showTaskFormBtn.addEventListener("click", openTaskForm);
    cancelTaskBtn.addEventListener("click", closeTaskForm);

    taskForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const text = taskInput.value.trim();
      const selectedType = taskTypeInput.value.trim();
      const customType = taskTypeCustomInput.value.trim().toLowerCase();
      const type = selectedType === "__custom__" ? customType : selectedType;
      const notes = taskNotesInput.value.trim();
      const agentEligible = taskAgentEligibleInput.checked;
      const project = getActiveProject();
      const editingTask = getEditingTask();

      if (!text || !project) {
        setStatus("Add a task name first.");
        return;
      }

      if (selectedType === "__custom__" && !customType) {
        setStatus("Add a custom task type first.");
        return;
      }

      if (customType && !state.customTaskTypes.includes(customType)) {
        state.customTaskTypes.push(customType);
        state.customTaskTypes.sort();
      }

      if (editingTask) {
        editingTask.text = text;
        editingTask.type = type;
        editingTask.notes = notes;
        editingTask.agentEligible = agentEligible;
        setStatus("Task updated.");
      } else {
        project.tasks.push({
          id: `task-${Date.now()}`,
          text,
          type,
          notes,
          agentEligible,
          done: false
        });
        setStatus("Task added.");
      }

      state.isTaskFormOpen = false;
      state.editingTaskId = null;
      persistAndRender();
    });

    tasksList.addEventListener("click", (event) => {
      const button = closestFromEventTarget(event, "[data-action]");
      if (!button) return;

      const project = getActiveProject();
      if (!project) return;

      const task = project.tasks.find((entry) => entry.id === button.dataset.taskId);
      if (!task) return;

      if (button.dataset.action === "toggle-task") {
        task.done = !task.done;
        setStatus(task.done ? "Task completed." : "Task marked active.");
      }

      if (button.dataset.action === "delete-task") {
        project.tasks = project.tasks.filter((entry) => entry.id !== button.dataset.taskId);
        setStatus("Task deleted.");
      }

      if (button.dataset.action === "edit-task") {
        editTask(button.dataset.taskId);
        return;
      }

      persistAndRender();
    });

    clearCompletedBtn.addEventListener("click", () => {
      const project = getActiveProject();
      if (!project) return;

      const before = project.tasks.length;
      project.tasks = project.tasks.filter((task) => !task.done);
      setStatus(before === project.tasks.length ? "No completed tasks to clear." : "Completed tasks cleared.");
      persistAndRender();
    });

    document.addEventListener("click", (event) => {
      const topbarTarget = closestFromEventTarget(event, ".topbar");
      const timerCardTarget = closestFromEventTarget(event, ".timer-card");

      if (!topbarTarget) {
        if (state.isWorkspaceMenuOpen) {
          state.isWorkspaceMenuOpen = false;
          syncMenuVisibility();
        }
      }

      if (!timerCardTarget) {
        if (state.isProjectMenuOpen) {
          state.isProjectMenuOpen = false;
          syncMenuVisibility();
        }
      }
    });

    window.addEventListener("beforeunload", saveState);

    loadState();
    persistAndRender();

    if (state.isRunning) {
      timerId = window.setInterval(tick, 1000);
      setStatus("Timer resumed.");
      saveState();
    }
  </script>
</body>
</html>
